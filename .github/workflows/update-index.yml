name: Update post index

on:
  push:
    paths:
      - 'posts/**.md'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate posts/index.json
        run: |
          python3 - << 'PYEOF'
          import os, json
          posts_dir = 'posts'
          files = sorted(
            [f for f in os.listdir(posts_dir) if f.endswith('.md')],
            reverse=True
          )
          with open(os.path.join(posts_dir, 'index.json'), 'w') as fp:
            json.dump({"posts": files}, fp, indent=2)
          print(f"Wrote {len(files)} posts to posts/index.json")
          PYEOF

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/index.json
          git diff --staged --quiet || git commit -m "chore: update post index [skip ci]"
          git push
